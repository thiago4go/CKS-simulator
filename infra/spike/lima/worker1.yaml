minimumLimaVersion: "2.1.4"
vmType: vz
arch: aarch64

images:
  - location: "https://cloud-images.ubuntu.com/releases/24.04/release-20260615/ubuntu-24.04-server-cloudimg-arm64.img"
    arch: aarch64
    digest: "sha256:cafa1a965b591b7c4184b484ffd8e625981a79d48f9b4ae8a4adf7b4c5ade927"

cpus: 3
memory: "6GiB"
disk: "40GiB"

mounts: []
networks:
  - lima: user-v2
portForwards: []

containerd:
  system: false
  user: false

provision:
  - mode: system
    script: |
      #!/bin/sh
      set -eu
      printf '%s\n' worker1 > /etc/cks-simulator-role
